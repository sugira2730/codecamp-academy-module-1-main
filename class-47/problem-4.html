        <h1>Problem 4</h1>
        <br>
        <p>
            Write a program that asks the user to enter their age and determines 
            their age category.
        </p>
        <br>
        <h4>Rules</h4>
        <ul>
            <li>If the age is less than 13 → "You are a child"</li>
            <li>If the age is between 13 and 17 → "You are a teenager"</li>
            <li>If the age is 18 or older → "You are an adult"</li>
        </ul>
    </main>
